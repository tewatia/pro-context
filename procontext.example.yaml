# ProContext configuration
# All fields are optional — the server runs with defaults if this file is absent.
#
# Environment variable overrides use double-underscore as the nesting separator:
#   PROCONTEXT__DATA_DIR=/custom/path/to/procontext-data
#   PROCONTEXT__CACHE__DB_PATH=/custom/path/to/cache.db
#   PROCONTEXT__SERVER__TRANSPORT=http
#   PROCONTEXT__SERVER__PORT=9090
#   PROCONTEXT__SERVER__AUTH_ENABLED=true
#   PROCONTEXT__SERVER__AUTH_KEY=my-secret-key
#   PROCONTEXT__LOGGING__LEVEL=DEBUG

# Root data directory for ProContext registry state.
# Override to relocate registry files.
# data_dir: "/custom/path/to/procontext-data"

server:
  transport: stdio # stdio | http
  host: "0.0.0.0" # HTTP mode only — address to bind the server to
  port: 8080 # HTTP mode only — port to listen on
  auth_enabled: false # HTTP mode only — enable bearer key authentication
  auth_key:
    "" # HTTP mode only — key checked against Authorization header;
    # if empty and auth_enabled=true, a random key is generated at startup

registry:
  metadata_url: "https://procontexthq.github.io/registry_metadata.json"
  # How often to check for registry updates in HTTP mode (stdio checks once at startup).
  # Lower values keep library metadata fresher; higher values reduce outbound traffic.
  poll_interval_hours: 24

cache:
  # How long fetched content is considered fresh before triggering a background re-fetch.
  # Applies to both llms.txt files (get_library_docs) and documentation pages (read_page).
  ttl_hours: 24
  # db_path default is platform-specific (via platformdirs) and independent of data_dir:
  #   Linux:   ~/.local/share/procontext/cache.db
  #   macOS:   ~/Library/Application Support/procontext/cache.db
  #   Windows: C:\Users\<user>\AppData\Local\procontext\cache.db
  # db_path: "/custom/path/to/cache.db"
  # How often the background cleanup task removes entries expired more than 7 days ago.
  cleanup_interval_hours: 6

fetcher:
  # Time (in seconds) to establish a TCP connection to a documentation host.
  # Keeps hangs short when a host is unreachable or unresponsive.
  connect_timeout_seconds: 5

  # Time (in seconds) to wait for the response body after connecting.
  # Increase if you regularly fetch large pages or are on a slow network.
  request_timeout_seconds: 30

  # Block requests to private/internal IP ranges (10.x.x.x, 192.168.x.x, 127.x.x.x,
  # ::1, fc00::/7, etc.). Strongly recommended to keep enabled — disabling this allows
  # ProContext to reach internal network services, which may expose sensitive endpoints.
  ssrf_private_ip_check: true

  # Restrict fetching to a known set of trusted domains. When enabled, ProContext only
  # fetches URLs whose base domain appears in the allowed set (built from the registry,
  # extra_allowed_domains, and any dynamically discovered domains per allowlist_expansion).
  # Set to false to allow fetching from any domain — only appropriate in fully isolated
  # or air-gapped environments where all reachable hosts are trusted.
  ssrf_domain_check: true

  # Controls whether the domain allowlist is expanded at runtime beyond the registry.
  # Has no effect when ssrf_domain_check is false.
  #
  #   "registry" — Registry only (default, strictest)
  #         Only domains explicitly listed in the ProContext registry are trusted
  #         (extracted from docs_url and llms_txt_url of each registry entry).
  #         Use this if you want tight control over what ProContext can reach.
  #
  #   "discovered" — Registry + domains found in fetched content
  #         After read_page or search_page fetches any content, all URLs found in
  #         that content have their base domains added to the allowlist. Enables
  #         following cross-domain links found in documentation. The allowlist is
  #         monotonic (domains are only added, never removed) and resets to the
  #         registry baseline on each registry update. In long-running HTTP mode
  #         it may grow across sessions until the next registry update.
  allowlist_expansion: "registry"

  # Additional domains to always trust, regardless of allowlist_expansion. These are merged
  # with the registry-derived allowlist at startup and persist across registry updates.
  #
  # ProContext matches on base domain (last two DNS labels), so adding a shared hosting
  # platform like "readthedocs.io" or "github.io" will trust ALL projects hosted there,
  # not just a specific one. Add shared hosting domains only if you trust the platform
  # broadly.
  extra_allowed_domains:
    - github.com # GitHub repository pages and documentation
    - githubusercontent.com # Raw GitHub file content (raw.githubusercontent.com)

resolver:
  # Minimum similarity score (0–100) for a fuzzy match to be included in results.
  # Higher values require closer matches and reduce false positives; lower values
  # cast a wider net and help with unusual or abbreviated queries.
  fuzzy_score_cutoff: 70

  # Maximum number of fuzzy match candidates returned by resolve_library.
  # Exact matches (package name, library ID, alias) always return a single result
  # regardless of this setting — it only caps the fuzzy fallback step.
  fuzzy_max_results: 5

logging:
  level: INFO # DEBUG | INFO | WARNING | ERROR
  format: json # json | text  (use text for local development)
